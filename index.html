<!DOCTYPE html>
<html>
<head>
  <title>Rishik Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 50px;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #764ba2;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Hello Rishik 👋</h1>
    <p>Welcome to my stylish website 😎🔥</p>

    <button onclick="showMsg()">Click Me</button>
  </div>

  <script>
    function showMsg() {
      alert("Welcome bhai 😎🔥");
    }
  </script>

</body>
</html>
